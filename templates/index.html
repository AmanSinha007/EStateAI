<!DOCTYPE html>
<html>
<head>
    <title>EstateAI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
<div class="card">

<h2>🏠 EstateAI - Price Predictor</h2>
<p style="text-align:center; opacity:0.8; margin-bottom:20px;">
Enter property details to get AI-based price estimation
</p>

<form action="/predict" method="post">

    <div class="form-group">
        <label>Bedrooms (BHK)</label>
        <input name="bhk" placeholder="e.g. 2" required>
    </div>

    <div class="form-group">
        <label>Bathrooms</label>
        <input name="bath" placeholder="e.g. 2" required>
    </div>

    <div class="form-group">
        <label>Area (sqft)</label>
        <input name="area" placeholder="e.g. 1200" required>
    </div>

    <div class="form-group">
        <label>Number of Floors</label>
        <input name="number_of_floors" placeholder="e.g. 2" required>
    </div>

    <div class="form-group">
        <label>Condition of House</label>
        <select name="condition_of_the_house">
            <option value="1">Poor</option>
            <option value="2">Fair</option>
            <option value="3">Average</option>
            <option value="4">Good</option>
            <option value="5">Excellent</option>
        </select>
    </div>

    <div class="form-group">
        <label>Grade (Quality Level)</label>
        <select name="grade_of_the_house">
            <option value="3">Basic</option>
            <option value="5">Standard</option>
            <option value="7">Premium</option>
            <option value="9">Luxury</option>
        </select>
    </div>

    <button type="submit">Predict Price</button>

</form>

</div>
</div>
</body>
</html>
